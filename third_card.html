<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(57, 89, 196);
        }

        .contentBox {
            height: 400px;
            width: 800px;
            background-image: url('razorpay.png');
            background-size: contain;
            display: flex;
            flex-direction: row;
        }
        .leftBox {
            height:400px;
            width: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding : 15px;
            color: rgb(213, 198, 198);
            gap:60px;
        }
        .leftBox h2 {
            /* color: rgb(213, 198, 198); */
            font-weight: bold;
            
        }
        .rightBox {
            height: 400px;
            width: 50%;
        }
        .contentBox .leftBox{
            background-color: rgb(58, 2, 58);
        }
        .stats{
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            gap: 60px;
        }



    </style>
</head>
<body>
    <div class="container">
        <div class="contentBox">
            <div class="leftBox">
                <div class="heading">
                    <h2>Get insights that help your bussiness grow</h2>
                </div>

                <div class="content">
                    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Maxime     debitis dicta atque repellat, placeat repellendus corporis     exercitationem magnam consectetur commodi.</p>
                </div>

                <div class ="stats">
                    <div class="leftside">
                        <h2>10k+</h2>
                        <p>Comments</p>
                    </div>

                    <div class="middleside">
                        <h2>214</h2>
                        <p>Paid Users</p>
                    </div>

                    <div class="rightside">
                        <h2>12M+</h2>
                        <p>Views</p>
                    </div>
                </div>
            </div>

            <div class="rightBox">

            </div>

        </div>
    </div>
</body>
</html>
